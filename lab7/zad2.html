<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zadanie 2</title>
  </head>
  <body>
    <div class="container">
      <h2>Formularz Rejestracji</h2>
      <form id="registrationForm">
        <div class="form-group">
          <label for="username">Nazwa użytkownika</label>
          <input type="text" id="username" name="username" />
        </div>

        <div class="form-group">
            <label for="email">Adres e-mail:</label>
            <input type="email" id="email" name="email" placeholder="adres@domena.rozszerzenie">
        </div>

        <div class="form-group">
            <label for="password">Hasło:</label>
            <input type="password" id="password" name="password">
        </div>

        <div class="form-group">
            <label for="repeatPassword">Powtórz hasło:</label>
            <input type="password" id="repeatPassword" name="repeatPassword">
        </div>

        <div class="form-group">
            <label for="dob">Data urodzenia:</label>
            <input type="date" id="dob" name="dob">
        </div>

        <div class="form-group">
            <label for="gender">Płeć:</label>
            <select name="gender" id="gender">
                <option value="">--Wybierz--</option>
                <option value="Mężczyzna">Mężczyzna</option>
                <option value="Kobieta">Kobieta</option>
                <option value="Nie chcę podawać">Nie chcę podawać</option>
            </select>
        </div>

        <div class="form-group">
            <label>Wersja do wyboru</label>
            <div class="radio-group">
                <input type="radio" id="free" name="version" value="Wersja darmowa">
                <label for="free" style="display: inline; font-weight: normal;">Wersja darmowa</label>
            </div>

            <div class="radio-group">
                <input type="radio" id="standard" name="version" value="Wersja standardowa">
                <label for="standard" style="display: inline; font-weight: normal;">Wersja standardowa</label>
            </div>

            <div class="radio-group">
                <input type="radio" id="premium" name="version" value="Wersja premium">
                <label for="premium" style="display: inline; font-weight: normal;">Wersja premium</label>
            </div>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="terms" name="terms">
            <label for="terms"></label>
        </div>
      </form>
    </div>
  </body>
</html>
