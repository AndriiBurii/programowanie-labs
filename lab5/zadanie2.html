    <script>
      let tablica = [];
      function wypiszParzyste(a, b) {
        for (let i = a; i <= b; i++) {
          if (i % 2 === 0) {
            tablica.push(i);
          }
        }
        console.log(tablica);
      }

      wypiszParzyste(2, 10);
    </script>
