<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zadanie 7</title>
  </head>
  <body>
    <script>
      function decToHex(liczba) {
        if (liczba == 0) {
          console.log("0");
          return;
        }

        let znakiHex = "0123456789ABCDEF";
        let wynik = "";

        while (liczba > 0) {
          let reszta = liczba % 16;
          wynik = znakiHex[reszta] + wynik;
          liczba = Math.floor(liczba / 16);
        }
        console.log(wynik);
      }

      decToHex(255);
      decToHex(475);
    </script>
  </body>
</html>
